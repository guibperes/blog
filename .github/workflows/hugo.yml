name: Deploy Hugo site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: "0.150.0"
  TZ: America/Sao_Paulo

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HUGO_ENVIRONMENT: production
      HUGO_CACHEDIR: ${{ github.workspace }}/.hugo_cache
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: gomod-${{ hashFiles('go.sum') }}
          restore-keys: |
            gomod-

      - name: Install Hugo
        run: |
          set -euo pipefail
          DEB="${{ runner.temp }}/hugo.deb"
          curl -fsSL -o "$DEB" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "$DEB"
          hugo version

      - name: Setup Node.js
        if: hashFiles('package-lock.json', 'npm-shrinkwrap.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node.js dependencies
        if: hashFiles('package-lock.json', 'npm-shrinkwrap.json') != ''
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Cache Hugo build cache
        uses: actions/cache@v4
        with:
          path: ${{ env.HUGO_CACHEDIR }}
          key: hugo-${{ env.HUGO_VERSION }}-${{ github.sha }}
          restore-keys: |
            hugo-${{ env.HUGO_VERSION }}-

      - name: Print module graph
        run: hugo mod graph

      - name: Build with Hugo
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
